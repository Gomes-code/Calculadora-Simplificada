<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora de Carbono TPF - Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=41">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: var(--bg-app);
      font-family: "Aptos", Roboto, Arial, sans-serif;
    }
    .hub-container {
      max-width: 800px;
      width: 90%;
      text-align: center;
    }
    .hub-logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 10px;
    }
    .hub-subtitle {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .hub-card {
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      border-radius: 12px;
      padding: 32px 24px;
      text-decoration: none;
      color: var(--text-main);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .hub-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      border-color: var(--tpf-blue-mid);
    }
    .hub-card.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .hub-card.disabled:hover {
      transform: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-color: var(--line-color);
    }
    .hub-card-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .hub-card-title {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .hub-card-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--tpf-orange);
      color: white;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .lang-selector {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--bg-panel);
      border: 1px solid var(--line-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <select class="lang-selector" id="langSelector" onchange="changeLang(this.value)">
    <option value="pt">🇧🇷 PT-BR</option>
    <option value="en">🇺🇸 EN</option>
    <option value="es">🇪🇸 ES</option>
    <option value="fr">🇫🇷 FR</option>
    <option value="de">🇩🇪 DE</option>
  </select>

  <div class="hub-container">
    <div class="hub-logo" data-i18n="hub_title">HUB DE SUSTENTABILIDADE</div>
    <div class="hub-subtitle" data-i18n="hub_subtitle">TPF Engenharia - Calculadoras de Carbono Incorporado</div>
    
    <div class="hub-grid">
      <a href="/residencial" class="hub-card">
        <div class="hub-card-icon">🏗️</div>
        <div class="hub-card-title" data-i18n="hub_edificacoes">Edificações</div>
        <div class="hub-card-desc" data-i18n="hub_edificacoes_desc">Análise de emissões e custos para projetos residenciais, comerciais e HIS.</div>
      </a>
      
      <div class="hub-card disabled" onclick="alert(getTranslation('hub_em_breve'))">
        <div class="badge" data-i18n="hub_em_breve">Em breve</div>
        <div class="hub-card-icon">🛣️</div>
        <div class="hub-card-title" data-i18n="hub_rodovias">Infraestrutura Rodoviária</div>
        <div class="hub-card-desc" data-i18n="hub_rodovias_desc">Análise de emissões e custos para pavimentação, terraplenagem e obras viárias.</div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/translations.js') }}?v=41"></script>
  <script>
    let currentLang = localStorage.getItem('tpf_lang') || 'pt';
    document.getElementById('langSelector').value = currentLang;

    function getTranslation(key) {
      if (translations[currentLang] && translations[currentLang][key]) {
        return translations[currentLang][key];
      }
      return key;
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = getTranslation(key);
      });
    }

    function changeLang(lang) {
      currentLang = lang;
      localStorage.setItem('tpf_lang', lang);
      applyTranslations();
    }

    // Aplica no load inicial
    applyTranslations();
  </script>
</body>
</html>
